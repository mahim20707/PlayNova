<!DOCTYPE html>
<html>
<head>
    <title>PlayNova</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HOME SCREEN -->
    <div id="home" class="container">
        <h1>🎮 PlayNova</h1>
        <p>Learn while you play!</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game" class="container" style="display:none;">
        <h2 id="question">Question will appear here</h2>

        <div class="options">
            <button onclick="checkAnswer(0)" id="opt0"></button>
            <button onclick="checkAnswer(1)" id="opt1"></button>
            <button onclick="checkAnswer(2)" id="opt2"></button>
        </div>

        <p id="result"></p>
    </div>

    <script src="script.js"></script>
</body>
    </html>
